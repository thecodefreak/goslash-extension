<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GoSlash</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <header class="popup-header">
        <div class="popup-brand">
          <svg class="popup-logo" width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="8" fill="currentColor"/>
            <path d="M20 8L12 24" stroke="white" stroke-width="3" stroke-linecap="round"/>
          </svg>
          <span class="popup-title">GoSlash</span>
        </div>
        <a id="open-options" href="options.html" target="_blank" class="options-link" title="Open full settings">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M7.84 1.804A1 1 0 0 1 8.82 1h2.36a1 1 0 0 1 .98.804l.331 1.652a6.993 6.993 0 0 1 1.929 1.115l1.598-.54a1 1 0 0 1 1.186.447l1.18 2.044a1 1 0 0 1-.205 1.251l-1.267 1.114a7.054 7.054 0 0 1 0 2.226l1.267 1.114a1 1 0 0 1 .205 1.251l-1.18 2.044a1 1 0 0 1-1.186.447l-1.598-.54a6.993 6.993 0 0 1-1.929 1.115l-.33 1.652a1 1 0 0 1-.98.804H8.82a1 1 0 0 1-.98-.804l-.331-1.652a6.993 6.993 0 0 1-1.929-1.115l-1.598.54a1 1 0 0 1-1.186-.447l-1.18-2.044a1 1 0 0 1 .205-1.251l1.267-1.114a7.054 7.054 0 0 1 0-2.226L1.821 7.773a1 1 0 0 1-.205-1.251l1.18-2.044a1 1 0 0 1 1.186-.447l1.598.54A6.993 6.993 0 0 1 6.51 3.456l.33-1.652ZM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd"/>
          </svg>
        </a>
      </header>

      <div id="tab-preview" class="tab-preview">
        <svg class="tab-favicon-placeholder" width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <rect x="2" y="4" width="16" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.7"/>
          <path d="M2 7h16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
        <span id="tab-title-preview" class="tab-title-preview">Loading...</span>
      </div>

      <form id="popup-form" class="popup-form">
        <div class="field" id="p-group-field" hidden>
          <label for="p-group">Group <span class="optional">(optional)</span></label>
          <select id="p-group" autocomplete="off"></select>
        </div>
        <div class="field">
          <label for="p-keyword">Shortcut keyword</label>
          <input id="p-keyword" type="text" placeholder="e.g. fb" autocomplete="off" spellcheck="false" />
          <small>Lowercase letters, numbers, dash, or underscore.</small>
        </div>
        <div class="field">
          <label for="p-url">URL</label>
          <input id="p-url" type="text" autocomplete="off" spellcheck="false" />
        </div>
        <div class="field">
          <label for="p-title">Title <span class="optional">(optional)</span></label>
          <input id="p-title" type="text" placeholder="e.g. Facebook" autocomplete="off" />
        </div>
        <div class="popup-actions">
          <button id="save-btn" type="submit">Save shortcut</button>
        </div>
      </form>

      <div id="popup-status" class="popup-status" hidden></div>

      <footer class="popup-footer">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSc8MrgKpUzzcC2hMqO_OsM_1iTmcokPuJ1oMPRZ-EARu8tmoA/viewform" target="_blank" class="feedback-link">Share feedback</a>
      </footer>
    </div>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
